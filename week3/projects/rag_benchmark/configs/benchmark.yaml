# RAG Evaluation Benchmark Configuration
benchmark_name: "CalderR RAG Benchmark 2026"
version: "1.0"
description: "Comprehensive comparison of RAG configurations"

# Embedding models to test
embedding_models:
  - name: "MiniLM-L6-v2"
    model_id: "all-MiniLM-L6-v2"
    dimension: 384
  - name: "BGE-small-en"
    model_id: "BAAI/bge-small-en-v1.5"
    dimension: 384

# Chunk size configurations
chunk_sizes:
  - size: 256
    overlap: 30
  - size: 512
    overlap: 50
  - size: 1024
    overlap: 100

# Retrieval k values
retrieval_k_values: [3, 5, 8]

# Retrieval strategies
retrieval_strategies:
  - name: "semantic"
    description: "Pure vector similarity search"
  - name: "hybrid"
    description: "BM25 + semantic ensemble (40/60)"

# Configurations to benchmark (subset for speed)
# Each config: embedding_model + chunk_size + k + strategy
benchmark_configs:
  - id: "config_1"
    embedding_model: "MiniLM-L6-v2"
    chunk_size: 256
    overlap: 30
    k: 3
    strategy: "semantic"
    label: "MiniLM-256-k3-semantic"

  - id: "config_2"
    embedding_model: "MiniLM-L6-v2"
    chunk_size: 512
    overlap: 50
    k: 3
    strategy: "semantic"
    label: "MiniLM-512-k3-semantic"

  - id: "config_3"
    embedding_model: "MiniLM-L6-v2"
    chunk_size: 1024
    overlap: 100
    k: 3
    strategy: "semantic"
    label: "MiniLM-1024-k3-semantic"

